version: '3.9'

services:

  tracking-service:
    build: ./tracking-service

    ports:
      - "8084:8084"

    depends_on:
      - mysql

  mysql:
    image: mysql:8

    container_name: mysql-tracking

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tubesdb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: